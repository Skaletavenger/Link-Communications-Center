name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [admin, user]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    env:
      # Dummy values so `next build` can prerender pages that create clients
      # at module load. No real requests are made during the build.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      PESAPAL_CONSUMER_KEY: ci-dummy
      PESAPAL_CONSUMER_SECRET: ci-dummy
      ANTHROPIC_API_KEY: ci-dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run build
